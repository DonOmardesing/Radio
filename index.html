<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Omar Radio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{height:100%;width:100%;overflow:hidden;background:#000;font-family:'Arial Black',sans-serif}
.container{position:relative;width:100vw;height:90vh;background:url('https://i.postimg.cc/15WrwXG8/864341A1-34F2-442D-A089-09826AB8FD31.png') no-repeat center bottom;background-size:contain}
.btn{position:absolute;bottom:5%;width:28%;height:18%;cursor:pointer;z-index:10;border:3px solid rgba(255,69,0,0.9);border-radius:18px;animation:neonPulse 2s infinite alternate;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:bold;text-align:center;background:linear-gradient(135deg,rgba(0,0,0,0.95) 0%,rgba(40,0,0,0.92) 100%);backdrop-filter:blur(8px);transition:all 0.3s;box-shadow:0 0 20px rgba(255,69,0,0.5)}
.btn:hover{transform:translateY(-5px) scale(1.05);border-color:rgba(255,69,0,1);box-shadow:0 10px 40px rgba(255,69,0,0.8)}
@keyframes neonPulse{0%{border-color:rgba(255,69,0,0.6);box-shadow:0 0 15px rgba(255,69,0,0.4)}100%{border-color:rgba(255,69,0,1);box-shadow:0 0 30px rgba(255,69,0,0.7)}}
.btn-icon{font-size:40px;margin-bottom:10px;filter:drop-shadow(0 0 8px rgba(255,100,0,0.9))}
.btn-text{color:#ff6b35;text-shadow:0 0 12px rgba(255,107,53,1);letter-spacing:2px;font-size:16px}
.btn-subtext{font-size:11px;color:#ffa500;margin-top:4px;text-shadow:0 0 8px rgba(255,165,0,0.8)}
#btn-playlist{left:4%}#btn-chat{left:36%}#btn-youtube{left:68%}
.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.95)}
.modal-content{position:relative;margin:2% auto;border:3px solid #ff4500;border-radius:20px;width:95%;max-width:800px;height:92vh;overflow:hidden;box-shadow:0 0 50px rgba(255,69,0,0.8)}
.modal-background{position:absolute;top:0;left:0;width:100%;height:100%;background:url('https://i.postimg.cc/RVxXZVkL/IMG-4736.jpg') center/cover;z-index:1}
.modal-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:2}
.close{position:absolute;top:15px;right:20px;color:#ff6b35;font-size:40px;cursor:pointer;z-index:10;transition:0.3s}
.close:hover{color:#ff0000;transform:scale(1.2)}
.modal-header{position:relative;z-index:5;text-align:center;padding:30px 20px}
.modal-title-main{color:#ff6b35;font-size:36px;font-weight:bold;text-shadow:0 0 20px rgba(255,107,53,1);letter-spacing:4px;animation:glow 2s infinite alternate}
@keyframes glow{from{text-shadow:0 0 10px rgba(255,107,53,0.8)}to{text-shadow:0 0 30px rgba(255,107,53,1)}}
.modal-title-sub{color:#ffa500;font-size:20px;margin-top:10px;font-style:italic}
.genre-buttons{position:relative;z-index:5;display:flex;flex-direction:column;gap:20px;padding:20px 40px;max-height:60vh;overflow-y:auto}
.genre-btn{width:100%;padding:20px;background:linear-gradient(135deg,rgba(255,69,0,0.9),rgba(200,40,0,0.85));border:3px solid rgba(255,100,50,0.8);border-radius:15px;color:#fff;font-size:20px;font-weight:bold;cursor:pointer;transition:0.3s;display:flex;align-items:center;justify-content:center;gap:15px}
.genre-btn:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 10px 35px rgba(255,69,0,0.8)}
.widget-display{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:20;display:none;overflow-y:auto;padding:20px}
.widget-display.active{display:block}
.widget-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding:15px;background:rgba(255,69,0,0.2);border-radius:10px;border:2px solid rgba(255,69,0,0.5)}
.widget-title{color:#ff6b35;font-size:24px;font-weight:bold}
.widget-back-btn{padding:10px 20px;background:rgba(255,69,0,0.8);border:2px solid rgba(255,100,50,1);border-radius:10px;color:#fff;cursor:pointer;font-size:14px}
.widget-back-btn:hover{background:rgba(255,80,20,1);transform:scale(1.05)}
.widget-container{position:relative;background:rgba(255,255,255,0.05);border-radius:15px;border:2px solid rgba(255,69,0,0.3);overflow:hidden;height:400px}
.widget-bg{position:absolute;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;z-index:1}
.widget-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.5) 40%,rgba(0,0,0,0.3) 100%);z-index:2}
.widget-content{position:relative;z-index:10;padding:20px;height:100%;display:flex;align-items:center;justify-content:center}
.mytuner-wrapper{width:100%;max-width:500px;position:relative}
@media(max-width:480px){.btn{height:16%}.btn-icon{font-size:32px}.btn-text{font-size:13px}.modal-title-main{font-size:28px}.genre-btn{font-size:16px;padding:15px}.widget-container{height:320px}}
</style>
</head>
<body oncontextmenu="return false;">

<div class="container">
<a href="#" class="btn" id="btn-playlist" onclick="openModal();return false;"><div class="btn-icon">📻</div><div class="btn-text">RADIO</div><div class="btn-subtext">AL AIRE</div></a>
<a href="https://wa.me/573008150549" class="btn" id="btn-chat" target="_blank"><div class="btn-icon">💬</div><div class="btn-text">CHAT</div><div class="btn-subtext">EN VIVO</div></a>
<a href="https://www.youtube.com/@donomar_radio" class="btn" id="btn-youtube" target="_blank"><div class="btn-icon">📺</div><div class="btn-text">YOUTUBE</div><div class="btn-subtext">CANAL</div></a>
</div>

<div id="genreModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<div class="modal-background"></div>
<div class="modal-overlay"></div>

<div id="genreSelector">
<div class="modal-header">
<div class="modal-title-main">DON OMAR RADIO</div>
<div class="modal-title-sub">My Music In Your Head</div>
</div>
<div class="genre-buttons">
<button class="genre-btn" onclick="showWidget('rock')">▶️ <span>CLASSIC ROCK</span></button>
<button class="genre-btn" onclick="showWidget('jazz')">▶️ <span>SMOOTH JAZZ</span></button>
<button class="genre-btn" onclick="showWidget('pop80s')">▶️ <span>POP & DANCE 80s</span></button>
</div>
</div>

<!-- Widget Classic Rock -->
<div id="widget-rock" class="widget-display">
<div class="widget-header"><div class="widget-title">🎸 CLASSIC ROCK</div><button class="widget-back-btn" onclick="backToGenres()">← VOLVER</button></div>
<div class="widget-container">
<div class="widget-bg" style="background-image:url('https://i.postimg.cc/K8b6j5tQ/IMG-3137.jpg')"></div>
<div class="widget-overlay"></div>
<div class="widget-content">
<div class="mytuner-wrapper">
<div id="rock-widget" data-target="492679"></div>
</div>
</div>
</div>
</div>

<!-- Widget Smooth Jazz -->
<div id="widget-jazz" class="widget-display">
<div class="widget-header"><div class="widget-title">🎷 SMOOTH JAZZ</div><button class="widget-back-btn" onclick="backToGenres()">← VOLVER</button></div>
<div class="widget-container">
<div class="widget-bg" style="background-image:url('https://i.postimg.cc/YqKVDxDB/IMG-4797.jpg')"></div>
<div class="widget-overlay"></div>
<div class="widget-content">
<div class="mytuner-wrapper">
<div id="jazz-widget" data-target="492676"></div>
</div>
</div>
</div>
</div>

<!-- Widget Pop & Dance 80s -->
<div id="widget-pop80s" class="widget-display">
<div class="widget-header"><div class="widget-title">🎹 POP & DANCE 80s</div><button class="widget-back-btn" onclick="backToGenres()">← VOLVER</button></div>
<div class="widget-container">
<div class="widget-bg" style="background-image:url('https://i.postimg.cc/Gp5gFPTY/IMG-4795.jpg')"></div>
<div class="widget-overlay"></div>
<div class="widget-content">
<div class="mytuner-wrapper">
<div id="pop80s-widget" data-target="449623"></div>
</div>
</div>
</div>
</div>

</div>
</div>

<script>
// Cargar widgets de myTuner
function loadMyTunerWidget(containerId, targetId){
const script=document.createElement('script');
script.src='https://mytuner-radio.com/static/js/widgets/widget-player-v1.js';
script.defer=true;
document.head.appendChild(script);

const widgetDiv=document.getElementById(containerId);
widgetDiv.setAttribute('data-target',targetId);
widgetDiv.className='mytuner-widget';

setTimeout(()=>applyCustomStyles(containerId),2000);
}

function applyCustomStyles(widgetId){
const widget=document.getElementById(widgetId);
if(!widget)return;

// Ocultar elementos no deseados
const hideElements=()=>{
const link=widget.querySelector('.player-radio-link');
const name=widget.querySelector('.player-radio-name');
const logo=widget.querySelector('.player-mytuner-logo');
const volume=widget.querySelector('.volume-controls');
const history=widget.querySelector('[id$="song-history"]');
const topBar=widget.querySelector('[id$="top-bar"]');

if(link)link.style.display='none';
if(name)name.style.display='none';
if(logo)logo.style.display='none';
if(volume)volume.style.display='none';
if(history)history.style.display='none';
if(topBar){
topBar.style.background='transparent';
topBar.style.padding='0';
topBar.style.border='none';
}

// Estilizar botón de play
const playBtn=widget.querySelector('.main-play-button');
if(playBtn){
playBtn.style.width='120px';
playBtn.style.height='120px';
playBtn.style.background='#fff';
playBtn.style.border='5px solid #000';
playBtn.style.borderRadius='50%';
playBtn.style.boxShadow='0 0 30px rgba(0,0,0,0.9),0 0 40px rgba(255,255,255,0.5)';
playBtn.style.margin='0 auto';
playBtn.style.float='none';
playBtn.style.transition='all 0.3s';

const playDiv=playBtn.querySelector('div');
if(playDiv){
playDiv.style.width='80px';
playDiv.style.height='80px';
playDiv.style.marginLeft='20px';
playDiv.style.backgroundSize='65px';
}

playBtn.onmouseover=()=>{
playBtn.style.transform='scale(1.15)';
playBtn.style.boxShadow='0 0 40px rgba(0,0,0,1),0 0 50px rgba(255,255,255,0.7)';
};
playBtn.onmouseout=()=>{
playBtn.style.transform='scale(1)';
playBtn.style.boxShadow='0 0 30px rgba(0,0,0,0.9),0 0 40px rgba(255,255,255,0.5)';
};
}
};

hideElements();
setInterval(hideElements,1000);
}

function openModal(){document.getElementById('genreModal').style.display='block';backToGenres()}
function closeModal(){document.getElementById('genreModal').style.display='none';document.getElementById('genreSelector').style.display='block'}
function showWidget(genre){
document.getElementById('genreSelector').style.display='none';
document.querySelectorAll('.widget-display').forEach(w=>w.classList.remove('active'));
document.getElementById('widget-'+genre).classList.add('active');

if(genre==='rock'&&!document.getElementById('rock-widget').innerHTML)loadMyTunerWidget('rock-widget','492679');
else if(genre==='jazz'&&!document.getElementById('jazz-widget').innerHTML)loadMyTunerWidget('jazz-widget','492676');
else if(genre==='pop80s'&&!document.getElementById('pop80s-widget').innerHTML)loadMyTunerWidget('pop80s-widget','449623');
}
function backToGenres(){document.querySelectorAll('.widget-display').forEach(w=>w.classList.remove('active'));document.getElementById('genreSelector').style.display='block'}
window.onclick=e=>{if(e.target.id==='genreModal')closeModal()};
</script>

</body>
</html>
