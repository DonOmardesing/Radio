<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DON OMAR RADIO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .container {
            width: 100%;
            height: 100vh;
            background: linear-gradient(to bottom, #1a0a00 0%, #0a0a0a 50%, #000 100%);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* LOGO HEADER */
        .header {
            text-align: center;
            padding: 20px 10px 10px;
            z-index: 10;
        }

        .cross {
            font-size: 50px;
            color: #ff4500;
            text-shadow: 0 0 20px #ff4500, 0 0 40px #ff6600;
            line-height: 1;
        }

        .logo {
            font-size: 42px;
            font-weight: 900;
            color: #ff4500;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(255,69,0,0.8);
            line-height: 1;
            margin: 5px 0;
        }

        .radio-text {
            font-size: 14px;
            color: #ff6600;
            letter-spacing: 8px;
            margin-top: 2px;
        }

        .tagline {
            font-size: 20px;
            color: #ffa500;
            font-style: italic;
            text-shadow: 0 0 15px rgba(255,165,0,0.6);
            margin-top: 8px;
            letter-spacing: 2px;
        }

        /* IMAGEN CENTRAL - STUDIO */
        .studio-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .studio-image {
            width: 100%;
            max-width: 400px;
            height: 280px;
            background: linear-gradient(135deg, #2a1a0a 0%, #1a0a00 100%);
            border: 3px solid #ff6600;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255,102,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .studio-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.15),
                rgba(0,0,0,0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
        }

        .on-air {
            background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
            color: #fff;
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 5px;
            border-radius: 5px;
            animation: blink 1.5s infinite;
            box-shadow: 0 0 20px #ff0000;
            z-index: 1;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* BOTONES - POSICIONADOS COMO EN LA IMAGEN */
        .buttons-wrapper {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 10px 30px;
            gap: 10px;
            z-index: 10;
        }

        .btn {
            flex: 1;
            max-width: 130px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border: 2px solid;
            border-radius: 12px;
            padding: 20px 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.6s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-icon {
            font-size: 32px;
            filter: drop-shadow(0 0 8px currentColor);
        }

        .btn-main {
            font-size: 13px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .btn-sub {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        /* COLORES ESPECIFICOS */
        .btn-playlist {
            border-color: #ff6600;
            box-shadow: 0 4px 15px rgba(255,102,0,0.3);
        }
        .btn-playlist .btn-icon { color: #ff6600; }
        .btn-playlist .btn-sub { color: #ff6600; }
        .btn-playlist:hover {
            box-shadow: 0 6px 25px rgba(255,102,0,0.6);
            border-color: #ff8800;
        }

        .btn-chat {
            border-color: #00d4ff;
            box-shadow: 0 4px 15px rgba(0,212,255,0.3);
        }
        .btn-chat .btn-icon { color: #00d4ff; }
        .btn-chat .btn-sub { color: #00d4ff; }
        .btn-chat:hover {
            box-shadow: 0 6px 25px rgba(0,212,255,0.6);
            border-color: #33e0ff;
        }

        .btn-youtube {
            border-color: #ff0000;
            box-shadow: 0 4px 15px rgba(255,0,0,0.3);
        }
        .btn-youtube .btn-icon { color: #ff0000; }
        .btn-youtube .btn-sub { color: #ff0000; }
        .btn-youtube:hover {
            box-shadow: 0 6px 25px rgba(255,0,0,0.6);
            border-color: #ff3333;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 10px;
            font-size: 11px;
            color: #666;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .footer span {
            color: #ff6600;
            margin: 0 8px;
        }

        /* SECURITY RINGS */
        .security-ring {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            border: 1px solid rgba(255,102,0,0.1);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: rotate 20s linear infinite;
        }

        .security-ring:nth-child(2) {
            width: 400px;
            height: 400px;
            border-color: rgba(0,212,255,0.1);
            animation-direction: reverse;
            animation-duration: 15s;
        }

        .security-ring:nth-child(3) {
            width: 300px;
            height: 300px;
            border-color: rgba(255,0,0,0.1);
            animation-duration: 10s;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* SCANLINES */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.1),
                rgba(0,0,0,0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 999;
        }

        /* SECURITY BADGE */
        .security-badge {
            position: fixed;
            bottom: 8px;
            right: 8px;
            font-size: 9px;
            color: #00ff00;
            z-index: 100;
            opacity: 0.5;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <!-- SECURITY RINGS -->
    <div class="security-ring"></div>
    <div class="security-ring"></div>
    <div class="security-ring"></div>
    
    <!-- SCANLINES -->
    <div class="scanlines"></div>

    <!-- MAIN CONTAINER -->
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="cross">✠</div>
            <div class="logo">DON OMAR</div>
            <div class="radio-text">RADIO</div>
            <div class="tagline">MY MUSIC IN YOUR HEAD</div>
        </div>

        <!-- STUDIO IMAGE -->
        <div class="studio-section">
            <div class="studio-image">
                <div class="on-air">ON AIR</div>
            </div>
        </div>

        <!-- THREE BUTTONS -->
        <div class="buttons-wrapper">
            <button class="btn btn-playlist" onclick="openLinktree()">
                <div class="btn-icon">🎧</div>
                <div class="btn-main">ESCUCHAR</div>
                <div class="btn-sub">PLAYLISTS</div>
            </button>

            <button class="btn btn-chat" onclick="openChat()">
                <div class="btn-icon">🎙️</div>
                <div class="btn-main">CHAT</div>
                <div class="btn-sub">EN VIVO</div>
            </button>

            <button class="btn btn-youtube" onclick="openYouTube()">
                <div class="btn-icon">📺</div>
                <div class="btn-main">YOUTUBE</div>
                <div class="btn-sub">CANAL</div>
            </button>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            ROCK <span>•</span> CLASSIC <span>•</span> REAL
        </div>
    </div>

    <!-- SECURITY BADGE -->
    <div class="security-badge">🔒 SECURE</div>

    </script>
</body>
</html>
