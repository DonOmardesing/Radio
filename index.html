<!DOCTYPE html>

<title>Don Omar Radio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Bebas Neue',sans-serif}
.top img{width:100%;display:block}
.bar{text-align:center;padding:16px;border-top:3px solid #00aaff}
.bar h1{color:#00ccff;font-size:32px;letter-spacing:6px}
.bar p{color:#aaa;letter-spacing:4px;font-size:13px}
.grid{padding:14px;max-width:960px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
.card{border:2px solid;border-radius:16px;overflow:hidden;background:#111}
.head{padding:10px;text-align:center;background:#000e2a}
.head h2{font-size:20px;letter-spacing:3px}
.c1{border-color:#00ccff}.c1 h2{color:#00ccff}
.c2{border-color:#ff0000}.c2 h2{color:#ff4444}
.c3{border-color:#fff}.c3 h2{color:#fff}
.c4{border-color:#00ffcc}.c4 h2{color:#00ffcc}
.c5{border-color:#ffaa00}.c5 h2{color:#ffaa00}
.c6{border-color:#aa00ff}.c6 h2{color:#aa44ff}
.body{background:#fff;min-height:160px;padding:0}
.footer{text-align:center;padding:20px;color:#555;font-size:10px;letter-spacing:2px;border-top:1px solid #222;margin-top:20px}
</style>
</head>
<body>
<div class="top"><img src="https://i.postimg.cc/LX71S6Qg/ADB05A68-4BD7-4A81-9C1F-E12F268158D6.png" alt="Don Omar Radio"></div>

<div class="card c4"><div class="head"><h2>TECNO</h2></div><div class="body"><div id="w4" class="mytuner-widget" data-target="492674" data-requires_initialization="true" data-autoplay="false" style="width:100%"></div></div></div>
