<script>
const streams={
joe80s:'https://streams.radio.dpgmedia.cloud/redirect/joe_80s_90s/mp3'
};

let currentAudio=null;
let currentBtn=null;

function openModal(){document.getElementById('genreModal').style.display='block'}
function closeModal(){document.getElementById('genreModal').style.display='none';stopAll()}
function showWidget(genre){
document.getElementById('genreSelector').style.display='none';
document.querySelectorAll('.widget-display').forEach(w=>w.classList.remove('active'));
document.getElementById('widget-'+genre).classList.add('active');
}
function backToGenres(){stopAll();document.querySelectorAll('.widget-display').forEach(w=>w.classList.remove('active'));document.getElementById('genreSelector').style.display='block'}
function stopAll(){
if(currentAudio){currentAudio.pause();currentAudio=null}
document.querySelectorAll('.play-btn').forEach(btn=>btn.classList.remove('playing'));
}
function toggleJoe80s(){toggleStation('joe80s','joe80s-btn',streams.joe80s)}
function toggleStation(name,btnId,url){
const btn=document.getElementById(btnId);
const audio=document.getElementById(name+'-audio');
if(currentAudio===audio){
audio.pause();
btn.classList.remove('playing');
currentAudio=null;
currentBtn=null;
}else{
stopAll();
audio.src=url;
audio.play().catch(e=>{
console.error('Error:',e);
alert('Emisora no disponible');
btn.classList.remove('playing');
});
btn.classList.add('playing');
currentAudio=audio;
currentBtn=btn;
audio.onerror=()=>{
btn.classList.remove('playing');
alert('Error de conexión');
};
}
}
window.onclick=e=>{if(e.target.id==='genreModal')closeModal()};
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}
</script>
