<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;overflow-y:auto}
.header{background:linear-gradient(180deg,#001133 0%,#000 100%);padding:24px 20px 16px;border-bottom:3px solid #0066cc;text-align:center}
.logo img{max-width:340px;width:90%;display:block;margin:0 auto}

.hero p{font-family:'Bebas Neue';color:#aaa;letter-spacing:4px;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;padding:16px;max-width:960px;margin:0 auto 30px}
.card{border:2px solid;border-radius:16px;overflow:hidden;background:#0a0a0a}
.card-head{padding:12px;text-align:center;background:#000e2a}
.card-head h3{font-family:'Bebas Neue';font-size:20px;letter-spacing:3px}
.c1{border-color:#00ccff}.c1 h3{color:#00ccff}
.c2{border-color:#ff0000}.c2 h3{color:#ff4444}
.c3{border-color:#e0e0e0}.c3 h3{color:#fff}
.c4{border-color:#00ffcc}.c4 h3{color:#00ffcc}
.c5{border-color:#ffaa00}.c5 h3{color:#ffaa00}
.c6{border-color:#aa00ff}.c6 h3{color:#cc66ff}
.card-body{background:#fff;min-height:160px;padding:0}
.card-body .mytuner-widget{width:100%!important;border:none!important}
.social{background:#001133;border-top:2px solid #0066cc;padding:24px;text-align:center}
.social a{width:58px;height:58px;border:2px solid;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;margin:6px;text-decoration:none;color:#fff;font-family:'Bebas Neue'}
.footer{text-align:center;padding:18px;color:#666;font-size:10px;letter-spacing:2px}
@media(max-width:720px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<script>
(function(){
 var ids=["w1","w2","w3","w4","w5","w6"];
 window.mytuner_scripts=window.mytuner_scripts||{};

  ls("https://mytuner-radio.com/static/js/widgets/widget-player-v1.js");
 });
})();
