<head>

<title>Don Omar Radio</title>
<style>
body,html { margin:0; padding:0; height:100%; width:100%; overflow: hidden; background:#000; }

.container {
position: relative;
width:100vw;
height:90vh;
background:url('https://i.postimg.cc/15WrwXG8/864341A1-34F2-442D-A089-09826AB8FD31.png') no-repeat center bottom;
background-size: contain;
}

.btn {
position: absolute;
bottom:5%;
width:28%;
height:18%;
cursor: pointer;
z-index:10;
border:3px solid rgba(255,69,0,0.9);
border-radius:18px;
animation: neonPulse 2s infinite alternate;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
font-weight: bold;
text-align: center;
background: linear-gradient(135deg, rgba(0,0,0,0.95) 0%, rgba(40,0,0,0.92) 100%);
backdrop-filter: blur(8px);
transition: all 0.3s ease;
text-decoration: none;
box-shadow: 0 0 20px rgba(255,69,0,0.5), inset 0 0 15px rgba(255,69,0,0.15);
}

.btn:hover {
transform: translateY(-5px) scale(1.05);
border-color: rgba(255,69,0,1);
box-shadow: 0 10px 40px rgba(255,69,0,0.8), inset 0 0 20px rgba(255,69,0,0.25);
}

@keyframes neonPulse {
0% { border-color:rgba(255,69,0,0.6); box-shadow:0 0 15px rgba(255,69,0,0.4), inset 0 0 10px rgba(255,69,0,0.1); }
100% { border-color:rgba(255,69,0,1); box-shadow:0 0 30px rgba(255,69,0,0.7), inset 0 0 15px rgba(255,69,0,0.2); }
}

.btn-icon { font-size: 40px; margin-bottom: 10px; filter: drop-shadow(0 0 8px rgba(255,100,0,0.9)); }
.btn-text { font-family: 'Arial Black', sans-serif; color: #ff6b35; text-shadow: 0 0 12px rgba(255,107,53,1), 0 0 20px rgba(255,107,53,0.6); letter-spacing: 2px; font-size: 16px; line-height: 1.2; }
.btn-subtext { font-size: 11px; color: #ffa500; margin-top: 4px; text-shadow: 0 0 8px rgba(255,165,0,0.8); letter-spacing: 1px; }

#btn-playlist { left:4%; }
#btn-chat { left:36%; }
#btn-youtube { left:68%; }

/* Modal */
.modal {
display: none;
position: fixed;
z-index: 1000;
left: 0; top: 0;
width: 100%; height: 100%;
overflow: auto;
background-color: rgba(0,0,0,0.95);
animation: fadeIn 0.3s;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-content {
position: relative;
margin: 2% auto;
padding: 0;
border: 3px solid #ff4500;
border-radius: 20px;
width: 95%;
max-width: 800px;
height: 92vh;
overflow: hidden;
box-shadow: 0 0 50px rgba(255,69,0,0.8);
animation: slideDown 0.4s;
}

@keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-background {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
background: url('https://i.postimg.cc/RVxXZVkL/IMG-4736.jpg') no-repeat center center;
background-size: cover;
z-index: 1;
}

.modal-overlay {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
background: rgba(0,0,0,0.75);
z-index: 2;
}

.close {
position: absolute;
top: 15px; right: 20px;
color: #ff6b35;
font-size: 40px;
font-weight: bold;
cursor: pointer;
transition: all 0.3s;
z-index: 10;
text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

.close:hover { color: #ff0000; transform: scale(1.2); }

.modal-header {
position: relative;
z-index: 5;
text-align: center;
padding: 30px 20px 20px;
}

.modal-title-main {
color: #ff6b35;
font-size: 36px;
font-weight: bold;
text-shadow: 0 0 20px rgba(255,107,53,1), 0 0 30px rgba(255,107,53,0.8);
margin: 0;
font-family: 'Arial Black', sans-serif;
letter-spacing: 4px;
animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
from { text-shadow: 0 0 10px rgba(255,107,53,0.8), 0 0 20px rgba(255,107,53,0.6); }
to { text-shadow: 0 0 20px rgba(255,107,53,1), 0 0 30px rgba(255,107,53,0.8), 0 0 40px rgba(255,107,53,0.6); }
}

.modal-title-sub {
color: #ffa500;
font-size: 20px;
font-weight: bold;
text-shadow: 0 0 15px rgba(255,165,0,0.9);
margin: 10px 0 0 0;
font-style: italic;
}

.genre-buttons {
position: relative;
z-index: 5;
display: flex;
flex-direction: column;
gap: 20px;
padding: 20px 40px;
max-height: 60vh;
overflow-y: auto;
}

.genre-btn {
width: 100%;
padding: 20px 30px;
background: linear-gradient(135deg, rgba(255,69,0,0.9) 0%, rgba(200,40,0,0.85) 100%);
border: 3px solid rgba(255,100,50,0.8);
border-radius: 15px;
color: #fff;
font-family: 'Arial Black', sans-serif;
font-size: 20px;
font-weight: bold;
cursor: pointer;
transition: all 0.3s ease;
text-shadow: 0 2px 4px rgba(0,0,0,0.8);
box-shadow: 0 5px 20px rgba(255,69,0,0.5);
display: flex;
align-items: center;
justify-content: center;
gap: 15px;
letter-spacing: 2px;
}

.genre-btn:hover {
transform: translateY(-5px) scale(1.02);
box-shadow: 0 10px 35px rgba(255,69,0,0.8);
border-color: rgba(255,150,100,1);
}

.play-icon { font-size: 28px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }

/* Widget display */
.widget-display {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
background: rgba(0,0,0,0.95);
z-index: 20;
display: none;
overflow-y: auto;
padding: 20px;
box-sizing: border-box;
}

.widget-display.active { display: block; animation: fadeIn 0.3s; }

.widget-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 20px;
padding: 15px;
background: linear-gradient(135deg, rgba(255,69,0,0.2) 0%, rgba(200,40,0,0.2) 100%);
border-radius: 10px;
border: 2px solid rgba(255,69,0,0.5);
}

.widget-title {
color: #ff6b35;
font-size: 24px;
font-weight: bold;
text-shadow: 0 0 10px rgba(255,107,53,0.8);
}

.widget-back-btn {
padding: 10px 20px;
background: rgba(255,69,0,0.8);
border: 2px solid rgba(255,100,50,1);
border-radius: 10px;
color: #fff;
font-weight: bold;
cursor: pointer;
transition: all 0.3s;
font-size: 14px;
}

.widget-back-btn:hover { background: rgba(255,80,20,1); transform: scale(1.05); }

.widget-container {
background: rgba(255,255,255,0.05);
border-radius: 15px;
padding: 20px;
border: 2px solid rgba(255,69,0,0.3);
}

.mytuner-widget .player-radio-link img,
.mytuner-widget .player-radio-name,
.mytuner-widget .player-mytuner-logo,
.mytuner-widget .player-radio-link { display: none !important; }

.mytuner-widget .main-play-button {
width: 80px !important;
height: 80px !important;
margin: 10px auto !important;
float: none !important;
display: block !important;
}

.mytuner-widget .main-play-button div {
width: 60px !important;
height: 60px !important;
background-size: 50px !important;
margin-left: 10px !important;
}

.mytuner-widget .volume-controls { display: none !important; }

@media (max-width: 480px) {
.btn { height: 16%; }
.btn-icon { font-size: 32px; }
.btn-text { font-size: 13px; letter-spacing: 1px; }
.btn-subtext { font-size: 10px; }
.modal-title-main { font-size: 28px; letter-spacing: 2px; }
.modal-title-sub { font-size: 16px; }
.genre-btn { font-size: 16px; padding: 15px 20px; }
.genre-buttons { padding: 15px 20px; }
}
</style>
</head>

<script>
function openModal() {
    document.getElementById('genreModal').style.display = 'block';
    backToGenres();
}

function closeModal() {
    document.getElementById('genreModal').style.display = 'none';
    document.getElementById('widget-rock').classList.remove('active');
    document.getElementById('widget-jazz').classList.remove('active');
    document.getElementById('widget-pop80s').classList.remove('active');
    document.getElementById('genreSelector').style.display = 'block';
}

function showWidget(genre) {
    document.getElementById('genreSelector').style.display = 'none';
    document.getElementById('widget-rock').classList.remove('active');
    document.getElementById('widget-jazz').classList.remove('active');
    document.getElementById('widget-pop80s').classList.remove('active');
    
    if (genre === 'rock') document.getElementById('widget-rock').classList.add('active');
    else if (genre === 'jazz') document.getElementById('widget-jazz').classList.add('active');
    else if (genre === 'pop80s') document.getElementById('widget-pop80s').classList.add('active');
}

function backToGenres() {
    document.getElementById('widget-rock').classList.remove('active');
    document.getElementById('widget-jazz').classList.remove('active');
    document.getElementById('widget-pop80s').classList.remove('active');
    document.getElementById('genreSelector').style.display = 'block';
}

window.onclick = function(event) {
    var modal = document.getElementById('genreModal');
    if (event.target == modal) closeModal();
}
</script>
