<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Omar Radio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700;900&display=swap');

body,html { margin:0; padding:0; height:100%; width:100%; overflow: hidden; background:#000; }

.container {
position: relative;
width:100vw;
height:90vh;
background:url('https://i.postimg.cc/15WrwXG8/864341A1-34F2-442D-A089-09826AB8FD31.png') no-repeat center bottom;
background-size: contain;
}

.btn {
position: absolute;
bottom:5%;
width:28%;
height:14%;
cursor: pointer;
z-index:10;
border:2px solid rgba(255,69,0,0.6);
border-radius:15px;
animation: neonPulse 2s infinite alternate;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
font-weight: bold;
text-align: center;
background: linear-gradient(135deg, rgba(0,0,0,0.9) 0%, rgba(20,0,0,0.85) 100%);
backdrop-filter: blur(5px);
transition: all 0.3s ease;
text-decoration: none;
}

.btn:hover {
transform: translateY(-5px);
border-color: rgba(255,69,0,1);
box-shadow: 0 10px 30px rgba(255,69,0,0.6);
}

@keyframes neonPulse {
0% { border-color:rgba(255,69,0,0.4); box-shadow:0 0 10px rgba(255,69,0,0.3); }
100% { border-color:rgba(255,69,0,0.9); box-shadow:0 0 25px rgba(255,69,0,0.7); }
}

.btn-icon { font-size: 32px; margin-bottom: 8px; filter: drop-shadow(0 0 5px rgba(255,100,0,0.8)); }
.btn-text { font-family: 'Arial Black', sans-serif; color: #ff6b35; text-shadow: 0 0 10px rgba(255,107,53,0.8); letter-spacing: 1px; font-size: 13px; line-height: 1.2; }
.btn-subtext { font-size: 10px; color: #ffa500; margin-top: 3px; text-shadow: 0 0 5px rgba(255,165,0,0.6); }

#btn-playlist { left:4%; }
#btn-chat { left:36%; }
#btn-youtube { left:68%; }

/* Modal */
.modal {
display: none;
position: fixed;
z-index: 1000;
left: 0; top: 0;
width: 100%; height: 100%;
overflow: auto;
background-color: rgba(0,0,0,0.95);
animation: fadeIn 0.3s;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-content {
position: relative;
margin: 2% auto;
padding: 0;
border: 3px solid #ff4500;
border-radius: 20px;
width: 95%;
max-width: 800px;
height: 92vh;
overflow: hidden;
box-shadow: 0 0 50px rgba(255,69,0,0.8);
animation: slideDown 0.4s;
}

@keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-background {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
background: url('https://i.postimg.cc/RVxXZVkL/IMG-4736.jpg') no-repeat center center;
background-size: cover;
z-index: 1;
}

.modal-overlay {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
background: rgba(0,0,0,0.65);
z-index: 2;
}

.close {
position: absolute;
top: 15px; right: 20px;
color: #ff6b35;
font-size: 40px;
font-weight: bold;
cursor: pointer;
transition: all 0.3s;
z-index: 10;
text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

.close:hover { color: #ff0000; transform: scale(1.2); }

.modal-header {
position: relative;
z-index: 5;
text-align: center;
padding: 40px 20px 30px;
}

.modal-title-main {
color: #fff;
font-size: 52px;
font-weight: 900;
text-shadow: 0 0 30px rgba(255,107,53,1), 0 0 50px rgba(255,69,0,0.8), 0 0 70px rgba(255,69,0,0.6);
margin: 0;
font-family: 'Orbitron', sans-serif;
letter-spacing: 8px;
animation: glow 2s ease-in-out infinite alternate;
text-transform: uppercase;
}

@keyframes glow {
from { text-shadow: 0 0 20px rgba(255,107,53,0.8), 0 0 40px rgba(255,107,53,0.6), 0 0 60px rgba(255,69,0,0.4); }
to { text-shadow: 0 0 30px rgba(255,107,53,1), 0 0 50px rgba(255,69,0,0.9), 0 0 70px rgba(255,69,0,0.7), 0 0 90px rgba(255,69,0,0.5); }
}

.modal-title-sub {
color: #ffa500;
font-size: 22px;
font-weight: bold;
text-shadow: 0 0 15px rgba(255,165,0,0.9);
margin: 15px 0 0 0;
font-style: italic;
font-family: 'Bebas Neue', cursive;
letter-spacing: 3px;
}

.genre-buttons {
position: relative;
z-index: 5;
display: flex;
flex-direction: column;
gap: 30px;
padding: 30px 50px;
max-height: 65vh;
overflow-y: auto;
}

.genre-btn {
width: 100%;
padding: 35px 40px;
background: transparent;
border: 4px solid rgba(255,69,0,0.9);
border-radius: 20px;
color: #fff;
font-family: 'Orbitron', sans-serif;
font-size: 28px;
font-weight: 700;
cursor: pointer;
transition: all 0.3s ease;
text-shadow: 0 0 15px rgba(255,107,53,0.8), 0 2px 4px rgba(0,0,0,0.9);
box-shadow: 0 0 20px rgba(255,69,0,0.4), inset 0 0 20px rgba(255,69,0,0.1);
display: flex;
align-items: center;
justify-content: center;
gap: 20px;
letter-spacing: 4px;
text-transform: uppercase;
backdrop-filter: blur(3px);
}

.genre-btn:hover {
transform: translateY(-5px) scale(1.02);
box-shadow: 0 0 40px rgba(255,69,0,0.8), inset 0 0 30px rgba(255,69,0,0.2);
border-color: rgba(255,100,50,1);
border-width: 5px;
background: rgba(255,69,0,0.05);
}

.play-icon { font-size: 36px; filter: drop-shadow(0 0 10px rgba(255,107,53,0.8)); }

/* Widget display */
.widget-display {
