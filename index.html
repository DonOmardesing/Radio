<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Omar Radio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body,html { 
    height:100%; 
    width:100%; 
    overflow: hidden; 
    background:#000;
}

.container {
    position: relative;
    width:100vw;
    height:100vh;
    /* Fondo degradado profesional mientras arreglamos la imagen */
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    background-size: cover;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

/* Si la imagen carga, se superpone al degradado */
.container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('https://i.postimg.cc/15WrwXG8/864341A1-34F2-442D-A089-09826AB8FD31.png') no-repeat center center;
    background-size: cover;
    opacity: 0.9;
    z-index: 0;
}

.buttons-container {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    padding-bottom: 40px;
    width: 100%;
    position: relative;
    z-index: 10;
}

.btn {
    width:30%;
    min-height: 90px;
    cursor: pointer;
    border:3px solid rgba(255,69,0,0.8);
    border-radius:15px;
    animation: neonPulse 2s infinite alternate;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
    transition: all 0.3s ease;
    text-decoration: none;
    margin: 0 1%;
}

@keyframes neonPulse {
    0% { border-color:rgba(255,69,0,0.4); box-shadow:0 0 10px rgba(255,69,0,0.3); }
    100% { border-color:rgba(255,69,0,0.9); box-shadow:0 0 25px rgba(255,69,0,0.7); }
}

.btn-icon { font-size: 32px; margin-bottom: 5px; }
.btn-text { font-family: 'Arial Black', sans-serif; color: #ff6b35; font-size: 14px; letter-spacing: 1px; }
.btn-subtext { font-size: 11px; color: #ffa500; margin-top: 2px; }

/* Modal */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.95);
}

.modal-content {
    position: relative;
    margin: 5% auto;
    width: 95%;
    max-width: 800px;
    height: 90vh;
    border: 3px solid #ff4500;
    border-radius: 20px;
    overflow: hidden;
}

.modal-background {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #2d132c 0%, #80132c 50%, #2d132c 100%);
    z-index: 1;
}

.close {
    position: absolute;
    top: 15px; right: 20px;
    color: #ff6b35;
    font-size: 40px;
    cursor: pointer;
    z-index: 10;
}

.modal-header {
    position: relative;
    z-index: 5;
    text-align: center;
    padding: 40px 20px;
}

.modal-title-main {
    color: #fff;
    font-size: 42px;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 4px;
    text-shadow: 0 0 30px rgba(255,107,53,1);
    margin-bottom: 10px;
}

.modal-title-sub {
    color: #ffa500;
    font-size: 20px;
    font-style: italic;
}

.genre-buttons {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 30px 40px;
}

.genre-btn {
    width: 100%;
    padding: 30px;
    background: transparent;
    border: 4px solid rgba(255,69,0,0.9);
    border-radius: 20px;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    letter-spacing: 3px;
}

.widget-display {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 20;
    display: none;
    overflow-y: auto;
    padding: 20px;
}

.widget-display.active { display: block; }

.widget-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 15px;
    background: rgba(255,69,0,0.2);
    border-radius: 10px;
}

.widget-title { color: #ff6b35; font-size: 20px; font-weight: bold; }

.widget-back-btn {
    padding: 10px 20px;
    background: rgba(255,69,0,0.8);
    border: 2px solid rgba(255,100,50,1);
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
}

.widget-container {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 20px;
}

@media (max-width: 480px) {
    .btn { min-height: 80px; }
    .btn-icon { font-size: 28px; }
    .btn-text { font-size: 12px; }
    .modal-title-main { font-size: 32px; }
    .genre-btn { font-size: 18px; padding: 25px; }
}
</style>
</head>
<body>

<div class="container">
    <div class="buttons-container">
        <a href="#" class="btn" onclick="openModal(); return false;">
            <div class="btn-icon">📻</div>
            <div class="btn-text">RADIO</div>
            <div class="btn-subtext">AL AIRE</div>
        </a>
        <a href="https://wa.me/573008150549" class="btn" target="_blank">
            <div class="btn-icon">💬</div>
            <div class="btn-text">CHAT</div>
            <div class="btn-subtext">EN VIVO</div>
        </a>
        <a href="https://www.youtube.com/@donomar_radio" class="btn" target="_blank">
            <div class="btn-icon">📺</div>
            <div class="btn-text">YOUTUBE</div>
            <div class="btn-subtext">CANAL</div>
        </a>
    </div>
</div>

<div id="genreModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div class="modal-background"></div>
        
        <div id="genreSelector">
            <div class="modal-header">
                <div class="modal-title-main">DON OMAR RADIO</div>
                <div class="modal-title-sub">My Music In Your Head</div>
            </div>
            <div class="genre-buttons">
                <button class="genre-btn" onclick="showWidget('rock')">▶️ CLASSIC ROCK</button>
                <button class="genre-btn" onclick="showWidget('jazz')">▶️ SMOOTH JAZZ</button>
                <button class="genre-btn" onclick="showWidget('pop80s')">▶️ POP & DANCE 80s</button>
            </div>
        </div>

        <div id="widget-rock" class="widget-display">
            <div class="widget-header">
                <div class="widget-title">🎸 CLASSIC ROCK</div>
                <button class="widget-back-btn" onclick="backToGenres()">← VOLVER</button>
            </div>
            <div class="widget-container">
                <div id="SGteSmFNw71dOWdpw6/Dl8Ojw5DCr8OmMMKkVVY=" class="mytuner-widget" data-target="492679"></div>
                <script>
                    var s=document.createElement("script");
                    s.src="https://mytuner-radio.com/static/js/widgets/widget-player-v1.js";
                    document.head.appendChild(s);
                </script>
            </div>
        </div>

        <div id="widget-jazz" class="widget-display">
            <div class="widget-header">
                <div class="widget-title">🎷 SMOOTH JAZZ</div>
                <button class="widget-back-btn" onclick="backToGenres()">← VOLVER</button>
            </div>
            <div class="widget-container">
                <div id="WyTDpFZZw5zCv8O9aVJpT8OZw6dAwqXDgMKmZcKnw4I=" class="mytuner-widget" data-target="492676"></div>
            </div>
        </div>

        <div id="widget-pop80s" class="widget-display">
            <div class="widget-header">
                <div class="widget-title">🎹 POP & DANCE 80s</div>
                <button class="widget-back-btn" onclick="backToGenres()">← VOLVER</button>
            </div>
            <div class="widget-container">
                <div id="QsOWVsONwrnDkcOWbyzDi8O3bMO7wrQ/Z0NNMVg7" class="mytuner-widget" data-target="444589"></div>
            </div>
        </div>
    </div>
</div>

<script>
function openModal() {
    document.getElementById('genreModal').style.display = 'block';
    backToGenres();
}

function closeModal() {
    document.getElementById('genreModal').style.display = 'none';
}

function showWidget(genre) {
    document.getElementById('genreSelector').style.display = 'none';
    document.querySelectorAll('.widget-display').forEach(w => w.classList.remove('active'));
    document.getElementById('widget-' + genre).classList.add('active');
}

function backToGenres() {
    document.querySelectorAll('.widget-display').forEach(w => w.classList.remove('active'));
    document.getElementById('genreSelector').style.display = 'block';
}

window.onclick = function(event) {
    if (event.target == document.getElementById('genreModal')) closeModal();
}
</script>

</body>
</html>
