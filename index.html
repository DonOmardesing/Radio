.btn {

/* Modal para Música en Vivo */
.modal {
display: none;
position: fixed;
z-index: 1000;
left: 0;
top: 0;
width: 100%;
height: 100%;
overflow: auto;
background-color: rgba(0,0,0,0.9);
animation: fadeIn 0.3s;
}

@keyframes fadeIn {
from { opacity: 0; }
to { opacity: 1; }
}

.modal-content {
background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
margin: 5% auto;
padding: 20px;
border: 2px solid #00d4ff;
border-radius: 20px;
width: 90%;
max-width: 600px;
box-shadow: 0 0 30px rgba(0,212,255,0.5);
position: relative;
animation: slideDown 0.4s;
}

@keyframes slideDown {
from { transform: translateY(-50px); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}

.close {
color: #00d4ff;
float: right;
font-size: 32px;
font-weight: bold;
cursor: pointer;
transition: all 0.3s;
line-height: 20px;
position: absolute;
right: 15px;
top: 10px;
}

.close:hover {
color: #ff4444;
transform: scale(1.2);
}

.modal-title {
color: #00d4ff;
text-align: center;
margin: 0 0 20px 0;
font-size: 22px;
text-shadow: 0 0 10px rgba(0,212,255,0.8);
}

.widget-container {
margin-top: 20px;
}
