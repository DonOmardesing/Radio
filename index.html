<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Omar Radio</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
        .container {
            position: relative;
            width: 100vw;
            height: 90vh; /* Ajustado para dejar espacio abajo */
            background: url('https://i.postimg.cc/XNsmqMTH/C7A45230-0B19-4877-9AC7-A1E432425BF2.png') no-repeat center bottom;
            background-size: contain; /* Asegura que se vea toda la imagen */
        }
        
        .btn {
            position: absolute;
            bottom: 5%; /* Separado de la base */
            width: 28%;
            height: 12%;
            cursor: pointer;
            z-index: 10;
            border: 2px solid transparent;
            border-radius: 15px;
            /* Efecto neón */
            animation: neonPulse 2s infinite alternate;
        }

        @keyframes neonPulse {
            0% { border-color: rgba(255, 0, 0, 0.3); box-shadow: 0 0 5px rgba(255, 0, 0, 0.3); }
            100% { border-color: rgba(255, 0, 0, 0.9); box-shadow: 0 0 20px rgba(255, 0, 0, 0.8); }
        }

        #btn-playlist { left: 4%; }
        #btn-chat { left: 36%; }
        #btn-youtube { left: 68%; }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <div class="container">
        <a href="https://linktr.ee/omardejmejia" class="btn" id="btn-playlist" target="_blank"></a>
        <a href="https://wa.me/573008150549" class="btn" id="btn-chat" target="_blank"></a>
        <a href="https://www.youtube.com/@donomar_radio" class="btn" id="btn-youtube" target="_blank"></a>
    </div>

</body>
</html>
