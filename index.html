<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Omar Radio</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('https://i.postimg.cc/XNsmqMTH/C7A45230-0B19-4877-9AC7-A1E432425BF2.png') no-repeat center center;
            background-size: cover;
        }
        .btn {
            position: absolute;
            bottom: 12%; 
            width: 25%;
            height: 15%;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            border-radius: 10px;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        #btn-playlist { left: 8%; }
        #btn-chat { left: 37.5%; }
        #btn-youtube { left: 67%; }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <div class="container">
        <a href="https://linktr.ee/omardejmejia" class="btn" id="btn-playlist" target="_blank" title="Escuchar Playlists"></a>
        <a href="https://wa.me/573008150549" class="btn" id="btn-chat" target="_blank" title="Chat en vivo"></a>
        <a href="https://www.youtube.com/@donomar_radio" class="btn" id="btn-youtube" target="_blank" title="Canal de YouTube"></a>
    </div>

    <script>
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
        }
    </script>
</body>
</html>
