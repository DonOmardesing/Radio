<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Don Omar Radio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden}
body{background:#000;color:#fff;font-family:'Bebas Neue',sans-serif}
.top-img{width:100%;display:block}
.top-img img{width:100%;height:auto;display:block;max-height:420px;object-fit:cover}
.title-bar{background:#000;text-align:center;padding:18px 10px 10px;border-top:3px solid #00aaff}
.title-bar h1{color:#00ccff;font-size:32px;letter-spacing:6px;line-height:1}
.title-bar p{color:#aaa;font-size:14px;letter-spacing:4px;margin-top:4px}
.grid{padding:16px;max-width:900px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
.card{border:2px solid;border-radius:18px;overflow:hidden;background:#0a0a0a}
.card-head{padding:12px;text-align:center;background:#000e2a;border-bottom:1px solid #222}
.card-head h2{font-size:22px;letter-spacing:3px}
.c1{border-color:#00ccff}.c1 h2{color:#00ccff}
.c2{border-color:#ff0000}.c2 h2{color:#ff4444}
.c3{border-color:#ccc}.c3 h2{color:#fff}
.c4{border-color:#00ffcc}.c4 h2{color:#00ffcc}
.c5{border-color:#ffaa00}.c5 h2{color:#ffaa00}
.c6{border-color:#aa00ff}.c6 h2{color:#cc66ff}
.card-body{padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;background:#111;min-height:180px;justify-content:center}
.big-play{width:78px;height:78px;border-radius:50%;border:3px solid currentColor;background:#000;color:inherit;font-size:34px;display:flex;align-items:center;justify-content:center;cursor:pointer}
audio{width:100%;margin-top:8px}
.social{padding:24px;text-align:center;background:#001133;border-top:2px solid #00aaff;margin-top:20px}
.social a{display:inline-flex;width:56px;height:56px;border:2px solid;border-radius:12px;align-items:center;justify-content:center;margin:6px;text-decoration:none;color:#fff;font-size:24px}
.footer{text-align:center;padding:20px;color:#666;font-size:10px;letter-spacing:2px}
</style>
</head>
<body>
<div class="top-img"><img src="https://i.postimg.cc/LX71S6Qg/ADB05A68-4BD7-4A81-9C1F-E12F268158D6.png" alt="Don Omar Radio"></div>
<div class="title-bar"><h1>MÚSICA CONTINUA 24/7</h1><p>MÚSICA SIN PARAR DESDE MEDELLÍN</p></div>
<div class="grid">
<div class="card c1"><div class="card-head"><h2>JOE 2000</h2></div><div class="card-body"><button class="big-play" data-id="0">▶</button><audio id="a0" controls preload="none" src="https://stream.zeno.fm/0r0xa4s8k5zuv"></audio></div></div>
<div class="card c2"><div class="card-head"><h2>ROCK 80S</h2></div><div class="card-body"><button class="big-play" data-id="1">▶</button><audio id="a1" controls preload="none" src="https://stream.zeno.fm/0r0xa4s8k5zuv"></audio></div></div>
<div class="card c3"><div class="card-head"><h2>SMOOTH JAZZ</h2></div><div class="card-body"><button class="big-play" data-id="2">▶</button><audio id="a2" controls preload="none" src="https://stream.zeno.fm/0r0xa4s8k5zuv"></audio></div></div>
<div class="card c4"><div class="card-head"><h2>TECNO</h2></div><div class="card-body"><button class="big-play" data-id="3">▶</button><audio id="a3" controls preload="none" src="https://stream.zeno.fm/0r0xa4s8k5zuv"></audio></div></div>
<div class="card c5"><div class="card-head"><h2>METAL</h2></div><div class="card-body"><button class="big-play" data-id="4">▶</button><audio id="a4" controls preload="none" src="https://stream.zeno.fm/0r0xa4s8k5zuv"></audio></div></div>
<div class="card c6"><div class="card-head"><h2>CHILLOUT</h2></div><div class="card-body"><button class="big-play" data-id="5">▶</button><audio id="a5" controls preload="none" src="https://stream.zeno.fm/0r0xa4s8k5zuv"></audio></div></div>
</div>
<div class="social">
<div style="color:#00ccff;letter-spacing:4px;margin-bottom:12px">SÍGUENOS EN:</div>
<a href="https://youtube.com/@donomar_radio" target="_blank" style="border-color:#ff0000">YT</a>
<a href="https://open.spotify.com/user/31ayh7eqvgueiw4xuufzokzxrmey" target="_blank" style="border-color:#1db954">SP</a>
<a href="https://wa.me/573008150549" target="_blank" style="border-color:#25d366">WA</a>
<a href="https://www.tiktok.com/@marka_voz" target="_blank" style="border-color:#fff">TK</a>
</div>
<div class="footer">TODOS LOS DERECHOS RESERVADOS - DONOMARDESING 2026</div>
<script>
const audios=document.querySelectorAll('audio');
const plays=document.querySelectorAll('.big-play');
plays.forEach(b=>{
 b.addEventListener('click',()=>{
  const id=parseInt(b.dataset.id);
  const a=audios[id];
  audios.forEach((x,i)=>{if(i!==id){x.pause();plays[i].textContent='▶'}});
  if(a.paused){a.play().then(()=>{b.textContent='⏸'}).catch(()=>{b.textContent='▶'});}else{a.pause();b.textContent='▶';}
 });
});
audios.forEach((a,i)=>{
 a.addEventListener('play',()=>{audios.forEach((x,j)=>{if(j!==i){x.pause();plays[j].textContent='▶'}});plays[i].textContent='⏸'});
 a.addEventListener('pause',()=>{plays[i].textContent='▶'});
});
</script>
</body>
</html>
