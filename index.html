<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Omar Radio - Tu Música 24/7</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 50%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
        }

        .logo {
            margin-bottom: 3rem;
            animation: fadeIn 1s ease-in;
        }

        .logo h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, #ff0040, #ff1493, #ff0040);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 3s linear infinite;
            text-shadow: 0 0 30px rgba(255, 0, 64, 0.5);
            margin-bottom: 0.5rem;
        }

        .logo p {
            font-size: 1.2rem;
            color: #ff1493;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeIn 1.5s ease-in;
        }

        .btn {
            padding: 1.5rem 3rem;
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .btn-linktree {
            background: linear-gradient(45deg, #43E660, #39D353);
            color: white;
        }

        .btn-linktree:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(67, 230, 96, 0.4);
        }

        .btn-chat {
            background: linear-gradient(45deg, #ff0040, #ff1493);
            color: white;
        }

        .btn-chat:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 0, 64, 0.4);
        }

        .btn i {
            font-size: 1.5rem;
        }

        .footer {
            margin-top: 3rem;
            padding: 1rem;
            color: #888;
            font-size: 0.9rem;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        @media (max-width: 480px) {
            .logo h1 {
                font-size: 2rem;
            }
            
            .btn {
                padding: 1.2rem 2rem;
                font-size: 1.1rem;
            }
        }
    </style>
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🎵 DON OMAR RADIO</h1>
            <p>Tu Música 24/7</p>
        </div>

        <div class="buttons-container">
            <!-- Botón Linktree (todas tus playlists) -->
            <a href="https://linktr.ee/omardejmejia" target="_blank" class="btn btn-linktree">
                <i class="fas fa-music"></i>
                <span>Escuchar Playlists</span>
            </a>

            <!-- Botón Chat Tawk.to -->
            <button onclick="openChat()" class="btn btn-chat">
                <i class="fas fa-comments"></i>
                <span>Chat en Vivo</span>
            </button>
        </div>

        <div class="footer">
            <p>&copy; 2024 Don Omar Radio. Todos los derechos reservados.</p>
        </div>
    </div>

    <!-- Script de Tawk.to - CONFIGURADO PARA Donomarradio -->
    <script type="text/javascript">
        // Función para abrir el chat manualmente
        function openChat() {
            if (typeof Tawk_API !== 'undefined') {
                Tawk_API.toggle();
            } else {
                // Si el chat aún no cargó, esperar un poco y intentar de nuevo
                setTimeout(function() {
                    if (typeof Tawk_API !== 'undefined') {
                        Tawk_API.toggle();
                    } else {
                        alert('Cargando chat... inténtalo de nuevo en un momento');
                    }
                }, 1000);
            }
        }

        // Widget de Tawk.to - Property ID: 6a39b9b49a65211d404f9d8b
        var Tawk_API = Tawk_API || {}, Tawk_LoadStart = new Date();
        (function() {
            var s1 = document.createElement("script"), s0 = document.getElementsByTagName("script")[0];
            s1.async = true;
            s1.src = 'https://embed.tawk.to/6a39b9b49a65211d404f9d8b/1hvn5qm8p';
            s1.charset = 'UTF-8';
            s1.setAttribute('crossorigin', '*');
            s0.parentNode.insertBefore(s1, s0);
        })();
    </script>
</body>
</html>
