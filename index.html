<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUSICA CONTINUA 24/7</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.header{background:linear-gradient(180deg,#11204a 0%,#070d1d 100%);border-bottom:3px solid #1e5bff;padding:26px 16px 20px;text-align:center;position:sticky;top:0;z-index:20;box-shadow:0 0 40px rgba(30,91,255,0.35)}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:4px;color:#2f7cff;text-shadow:0 0 12px rgba(47,124,255,0.9),0 0 32px rgba(47,124,255,0.5);line-height:0.9}
.header p{margin-top:8px;font-size:11px;letter-spacing:5px;color:#6a8ac6;font-weight:800}
.wrap{max-width:420px;margin:0 auto;padding:0 16px}
.btn-copy{width:100%;margin-top:18px;background:#1e5bff;color:#fff;border:none;border-radius:14px;padding:16px 20px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;cursor:pointer;box-shadow:0 0 22px rgba(30,91,255,0.6),inset 0 1px 0 rgba(255,255,255,0.2);transition:0.15s}
.btn-copy:active{transform:scale(0.97)}
.grid{display:flex;flex-direction:column;gap:16px;margin-top:20px;padding-bottom:30px}
.card{background:#0e0e0e;border:2px solid;border-radius:20px;overflow:hidden;transition:0.25s ease;position:relative}
.card.active{transform:scale(1.02);box-shadow:0 0 30px currentColor}
.card-header{padding:16px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.07);font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2.5px}
.card-body{padding:30px 20px 24px;display:flex;flex-direction:column;align-items:center;gap:14px}
.play-btn{width:78px;height:78px;border-radius:50%;background:#000;border:3px solid currentColor;color:#fff;font-size:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 18px currentColor, inset 0 0 10px rgba(0,0,0,0.8);transition:0.18s;user-select:none;-webkit-tap-highlight-color:transparent}
.play-btn:active{transform:scale(0.9)}
.play-btn.playing{background:#fff;color:#000;border-color:#fff;box-shadow:0 0 22px #fff}
.status{font-size:11px;letter-spacing:3px;font-weight:800;opacity:0.55}
.card.active .status{opacity:1}
.source-label{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:#444;margin:10px 0 10px}
#sourceArea{width:100%;height:300px;background:#080808;color:#666;border:1px solid #1e1e1e;border-radius:14px;padding:12px;font-size:10px;line-height:1.4;font-family:monospace;resize:vertical}
</style>
</head>
<body>
<div class="header">
<h1>MUSICA CONTINUA 24/7</h1>
<p>24H NON-STOP • PULSA PLAY • SIN CORTES</p>
</div>
<div class="wrap">
<button class="btn-copy" id="copyBtn">📋 COPIAR TODO EL CODIGO</button>
<div class="grid">
<div class="card" id="card-joe" style="border-color:#2f7cff;color:#2f7cff">
<div class="card-header" style="color:#2f7cff">JOE 2000</div>
<div class="card-body">
<button class="play-btn" data-target="audio-joe">▶</button>
<div class="status">TOCA PARA SONAR</div>
<audio id="audio-joe" preload="none" src="https://stream.zeno.fm/4a2yq0w8k5zuv"></audio>
</div>
</div>
<div class="card" id="card-rock" style="border-color:#ff2a4a;color:#ff2a4a">
<div class="card-header" style="color:#ff2a4a">ROCK 80S</div>
<div class="card-body">
<button class="play-btn" data-target="audio-rock">▶</button>
<div class="status">TOCA PARA SONAR</div>
<audio id="audio-rock" preload="none" src="https://stream.zeno.fm/7s9k2c3d1x0yv"></audio>
</div>
</div>
<div class="card" id="card-jazz" style="border-color:#ffffff;color:#ffffff">
<div class="card-header" style="color:#ffffff">SMOOTH JAZZ</div>
<div class="card-body">
<button class="play-btn" data-target="audio-jazz">▶</button>
<div class="status">TOCA PARA SONAR</div>
<audio id="audio-jazz" preload="none" src="https://stream.zeno.fm/0r0xa4s8k5zuv"></audio>
</div>
</div>
<div class="card" id="card-metal" style="border-color:#00f0ff;color:#00f0ff">
<div class="card-header" style="color:#00f0ff">METAL</div>
<div class="card-body">
<button class="play-btn" data-target="audio-metal">▶</button>
<div class="status">TOCA PARA SONAR</div>
<audio id="audio-metal" preload="none" src="https://stream.zeno.fm/5v8a3g2f1x0yv"></audio>
</div>
</div>
<div class="card" id="card-tecno" style="border-color:#2f7cff;color:#2f7cff">
<div class="card-header" style="color:#2f7cff">TECNO</div>
<div class="card-body">
<button class="play-btn" data-target="audio-tecno">▶</button>
<div class="status">TOCA PARA SONAR</div>
<audio id="audio-tecno" preload="none" src="https://stream.zeno.fm/6d5e8f9a2b1cv"></audio>
</div>
</div>
<div class="card" id="card-chill" style="border-color:#ff2a4a;color:#ff2a4a">
<div class="card-header" style="color:#ff2a4a">CHILLOUT</div>
<div class="card-body">
<button class="play-btn" data-target="audio-chill">▶</button>
<div class="status">TOCA PARA SONAR</div>
<audio id="audio-chill" preload="none" src="https://stream.zeno.fm/8w2e4r5t6y7uv"></audio>
</div>
</div>
</div>
<div class="source-label">CODIGO FUENTE COMPLETO ↓ COPIA Y PEGA EN GITHUB COMO index.html</div>
<textarea id="sourceArea" readonly></textarea>
<div style="height:40px"></div>
</div>
<script>
function getCleanHtml(){
  var ta=document.getElementById('sourceArea');
  var prev=ta?ta.value:'';
  if(ta) ta.value='';
  var html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  if(ta) ta.value=prev;
  return html;
}
var audios=document.querySelectorAll('audio');
var buttons=document.querySelectorAll('.play-btn');
function pauseAllExcept(current){
  audios.forEach(function(a){
    if(a!==current){a.pause();try{a.currentTime=0}catch(e){}}
  });
  buttons.forEach(function(b){
    if(!current || b.getAttribute('data-target')!==current.id){
      b.textContent='▶';
      b.classList.remove('playing');
      var c=b.closest('.card');
      if(c){c.classList.remove('active');var s=c.querySelector('.status');if(s)s.textContent='TOCA PARA SONAR';}
    }
  });
}
buttons.forEach(function(btn){
  btn.addEventListener('click', function(){
    var audio=document.getElementById(btn.getAttribute('data-target'));
    if(!audio) return;
    if(!audio.paused){
      audio.pause();
      btn.textContent='▶';
      btn.classList.remove('playing');
      btn.closest('.card').classList.remove('active');
      btn.closest('.card').querySelector('.status').textContent='TOCA PARA SONAR';
    }else{
      pauseAllExcept(audio);
      audio.play().then(function(){
        btn.textContent='⏸';
        btn.classList.add('playing');
        btn.closest('.card').classList.add('active');
        btn.closest('.card').querySelector('.status').textContent='● EN VIVO';
      }).catch(function(){
        alert('El navegador bloqueo el autoplay. Toca de nuevo PLAY.');
      });
    }
  });
});
audios.forEach(function(a){
  a.addEventListener('ended', function(){pauseAllExcept(null);});
  a.addEventListener('error', function(){var b=document.querySelector('[data-target="'+a.id+'"]');if(b){b.closest('.card').querySelector('.status').textContent='ERROR STREAM';}});
});
document.getElementById('copyBtn').addEventListener('click', function(){
  var full=getCleanHtml();
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(full).then(function(){
      var b=document.getElementById('copyBtn');b.textContent='✓ COPIADO!';setTimeout(function(){b.textContent='📋 COPIAR TODO EL CODIGO';},2000);
    });
  }else{
    var ta=document.getElementById('sourceArea');ta.focus();ta.select();document.execCommand('copy');
    var b=document.getElementById('copyBtn');b.textContent='✓ COPIADO!';setTimeout(function(){b.textContent='📋 COPIAR TODO EL CODIGO';},2000);
  }
});
window.addEventListener('DOMContentLoaded', function(){
  setTimeout(function(){
    var ta=document.getElementById('sourceArea');
    if(ta) ta.value=getCleanHtml();
  },400);
});
</script>
</body>
</html>
